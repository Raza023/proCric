<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 3D Cricket Champion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #050a10;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
        }

        /* HUD & UI Overlay */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 12px;
            border-left: 5px solid #00ffee;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .score-row {
            font-size: 24px;
            font-weight: 700;
            color: #eee;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-val {
            color: #00ffee;
            font-size: 32px;
        }

        .controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 30px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .key-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            opacity: 0.8;
        }

        .key {
            background: #fff;
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            min-width: 15px;
            text-align: center;
        }

        .bowl-type {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: #ffaa00;
            font-weight: 700;
            text-transform: uppercase;
        }

        .shot-feedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 255, 238, 0.5);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #00ffee;
            pointer-events: none;
        }

        .shot-feedback.show {
            opacity: 1;
            transform: translate(-50%, -60%) scale(1.2);
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a2a40 0%, #050a10 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .start-title {
            font-size: 70px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px #00ffee;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 20px;
            background: #00ffee;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 238, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 238, 0.7);
        }

        #game-over-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a2a40 0%, #050a10 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-title {
            font-size: 70px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px #00ffee;
        }

        .restart-btn {
            padding: 15px 50px;
            font-size: 20px;
            background: #00ffee;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 238, 0.4);
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 238, 0.7);
        }

        #toss-overlay, #decision-overlay, #innings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 10, 16, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .toss-btn, .decision-btn {
            padding: 15px 40px;
            margin: 10px;
            font-size: 18px;
            background: transparent;
            color: #00ffee;
            border: 2px solid #00ffee;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .toss-btn:hover, .decision-btn:hover {
            background: #00ffee;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 238, 0.5);
        }

        .status-text {
            font-size: 24px;
            margin-bottom: 20px;
            color: #eee;
            text-align: center;
            max-width: 600px;
        }

        #match-status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 238, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #00ffee;
            font-weight: 700;
            color: #00ffee;
        }
    </style>
</head>

<body>
    <div id="start-overlay">
        <h1 class="start-title">CRICKET PRO 3D</h1>
        <button class="start-btn" onclick="startGame()">ENTER THE STADIUM</button>
    </div>

    <div id="game-over-overlay">
        <h1 class="game-over-title">GAME OVER</h1>
        <div id="game-over-status" class="status-text"></div>
        <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <div id="toss-overlay">
        <h1 class="start-title">THE TOSS</h1>
        <div class="status-text">CHOOSE HEADS OR TAILS</div>
        <div style="display: flex;">
            <button class="toss-btn" onclick="handleToss('HEADS')">HEADS</button>
            <button class="toss-btn" onclick="handleToss('TAILS')">TAILS</button>
        </div>
    </div>

    <div id="decision-overlay">
        <h1 class="start-title" id="toss-result-title">YOU WON THE TOSS!</h1>
        <div class="status-text" id="toss-result-text">WHAT WOULD YOU LIKE TO DO?</div>
        <div id="decision-buttons" style="display: flex;">
            <button class="decision-btn" onclick="makeDecision('BATTING')">BAT FIRST</button>
            <button class="decision-btn" onclick="makeDecision('BOWLING')">BOWL FIRST</button>
        </div>
        <button id="decision-continue-btn" class="start-btn" style="display: none;" onclick="startInnings()">CONTINUE</button>
    </div>

    <div id="innings-overlay">
        <h1 class="start-title">INNINGS BREAK</h1>
        <div class="status-text" id="innings-status-text"></div>
        <button class="start-btn" onclick="startInnings()">START SECOND INNINGS</button>
    </div>

    <div id="game-ui" style="display: none;">
        <div id="match-status">1ST INNINGS</div>
        <div class="scoreboard">
            <div class="score-row"><span id="batting-team">USER</span>: <span id="score" class="score-val">0 / 0</span></div>
            <div class="score-row" style="font-size: 16px; margin-top: 5px;">OVERS: <span id="overs"
                    style="color: #bbb;">0.0</span> / 2.0</div>
            <div id="target-ui" class="score-row" style="font-size: 14px; margin-top: 5px; color: #ffaa00; display: none;">TARGET: <span id="target-val">0</span></div>
        </div>

        <div id="bowl-type" class="bowl-type">READY...</div>

        <div id="shot-feedback" class="shot-feedback">EXCELLENT!</div>

        <div id="batting-controls" class="controls-hint">
            <div class="key-hint"><span class="key">D</span> DRIVE</div>
            <div class="key-hint"><span class="key">S</span> LOFT</div>
            <div class="key-hint"><span class="key">SPACE</span> DEFEND</div>
            <div class="key-hint"><span class="key">L</span> LEAVE</div>
            <div class="key-hint"><span class="key">MOUSE</span> AIM</div>
        </div>

        <div id="bowling-controls" class="controls-hint" style="display: none;">
            <div class="key-hint"><span class="key">SPACE</span> BOWL</div>
            <div class="key-hint"><span class="key">MOUSE</span> PITCH</div>
        </div>

        <button onclick="toggleHandedness()" style="position: absolute; bottom: 100px; right: 20px; pointer-events: auto; background: #00ffee; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: bold;">TOGGLE L/R STANCE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>

    <script>
        // --- CONSTANTS & SETTINGS ---
        const PITCH_WIDTH = 3;
        const PITCH_LENGTH = 20;
        const BOUNDARY_RADIUS = 60;
        const STRIKER_POS = new THREE.Vector3(0.5, 0, PITCH_LENGTH / 2 - 2);
        const BOWL_POS = new THREE.Vector3(0, 5, -PITCH_LENGTH / 2);

        // --- GAME STATE ---
        let score = 0;
        let ballsBowled = 0;
        let isBallInPlay = false;
        let currentBowlerType = 'FAST';
        let batState = 'idle';
        let mouseX = 0;
        let mouseY = 0; // Added for pitching control
        let lastTiming = 0;
        let isGameOver = false;
        let wickets = 0;
        let batsmanHand = 'RIGHT';
        let hasTouchedGroundAfterHit = false;

        // --- NEW MATCH STATE ---
        let currentInnings = 1;
        let userRole = 'BATTING'; // 'BATTING' or 'BOWLING'
        let currentBattingTeam = 'USER';
        let target = 0;
        let userWonToss = false;
        let matchResult = "";
        let pitchingPos = new THREE.Vector3(0, 0, 0);

        // --- THREE.JS GLOBALS ---
        let scene, camera, renderer, world;
        let ballMesh, ballBody;
        let batGroup, batBody;
        let fielders = [];
        let physicsMaterial;
        let cameraState = 'fixed'; // 'fixed', 'follow', 'bowling_side'
        let bowlerObj, batsmanObj;
        let pitchingMarker, directionGuide;
        let userPitchingCursor;

        function showPitchPrediction() {
            const y0 = ballBody.position.y;
            const vy0 = ballBody.velocity.y;
            const vz0 = ballBody.velocity.z;
            const vx0 = ballBody.velocity.x;
            const g = -9.82;

            const a = 0.5 * g;
            const b = vy0;
            const c = y0 - 0.05;
            const det = b * b - 4 * a * c;

            if (det >= 0) {
                const t = (-b - Math.sqrt(det)) / (2 * a);
                if (t > 0) {
                    pitchingMarker.position.x = ballBody.position.x + vx0 * t;
                    pitchingMarker.position.z = ballBody.position.z + vz0 * t;
                    pitchingMarker.visible = true;
                }
            }
        }

        function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050a10);
            scene.fog = new THREE.Fog(0x050a10, 40, 150);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, PITCH_LENGTH / 2 + 8);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Physics World
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            physicsMaterial = new CANNON.Material("physics");
            const contactMaterial = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, {
                friction: 0.1,
                restitution: 0.4
            });
            world.addContactMaterial(contactMaterial);

            createEnvironment();
            createPlayers();
            setupControls();

            animate();
        }

        function createEnvironment() {
            // Ground (Circular Grass)
            const groundGeo = new THREE.CircleGeometry(150, 64);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a2a1a, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const groundBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // Pitch
            const pitchGeo = new THREE.PlaneGeometry(PITCH_WIDTH, PITCH_LENGTH);
            const pitchMat = new THREE.MeshStandardMaterial({
                color: 0xccaa88,
                map: createPitchTexture(),
                roughness: 0.5
            });
            const pitch = new THREE.Mesh(pitchGeo, pitchMat);
            pitch.rotation.x = -Math.PI / 2;
            pitch.position.y = 0.01;
            pitch.receiveShadow = true;
            scene.add(pitch);

            // Outfield Rings (Paint)
            const ringGeo = new THREE.RingGeometry(BOUNDARY_RADIUS - 0.5, BOUNDARY_RADIUS + 0.5, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            const boundary = new THREE.Mesh(ringGeo, ringMat);
            boundary.rotation.x = -Math.PI / 2;
            boundary.position.y = 0.02;
            scene.add(boundary);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
                const light = new THREE.DirectionalLight(0xffffff, 0.6);
                light.position.set(Math.cos(angle) * 80, 60, Math.sin(angle) * 80);
                light.castShadow = true;
                light.shadow.mapSize.width = 2048;
                light.shadow.mapSize.height = 2048;
                scene.add(light);
            }

            // Sky Stars
            const starsVecs = [];
            for (let i = 0; i < 3000; i++) starsVecs.push((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 200 + 100, (Math.random() - 0.5) * 400);
            const starsGeo = new THREE.BufferGeometry();
            starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVecs, 3));
            const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0x5588ff, size: 0.5 }));
            scene.add(stars);
        }

        function createPitchTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ccaa88'; ctx.fillRect(0, 0, 128, 512);
            ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, 50); ctx.lineTo(128, 50); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 462); ctx.lineTo(128, 462); ctx.stroke();
            return new THREE.CanvasTexture(canvas);
        }

        function createPlayers() {
            // Cleanup existing if any
            if (fielders.length > 0) {
                fielders.forEach(f => scene.remove(f.mesh));
                fielders = [];
            }
            if (ballMesh) scene.remove(ballMesh);
            if (ballBody) world.removeBody(ballBody);
            // Stumps
            scene.traverse(child => {
                if (child.physicsBody) {
                    world.removeBody(child.physicsBody);
                }
            });
            // Wickets
            const toRemove = [];
            scene.children.forEach(c => { if (c.isWicketGroup) toRemove.push(c); });
            toRemove.forEach(c => scene.remove(c));

            // Wickets
            const wicketMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            for (let zSide of [1, -1]) {
                const group = new THREE.Group();
                group.isWicketGroup = true;
                for (let i = -1; i <= 1; i++) {
                    const stump = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.85), wicketMat);
                    const sx = i * 0.10;
                    const sz = zSide * PITCH_LENGTH / 2;
                    stump.position.set(sx, 0.425, sz);
                    group.add(stump);

                    // Add physics to striker-end stumps
                    if (zSide === 1) {
                        const sBody = new CANNON.Body({
                            mass: 1.0,
                            material: physicsMaterial,
                            position: new CANNON.Vec3(sx, 0.425, sz)
                        });
                        // Rotate cylinder shape to stand vertical (along Y axis)
                        const q = new CANNON.Quaternion();
                        q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
                        sBody.addShape(new CANNON.Cylinder(0.04, 0.04, 0.85, 8), new CANNON.Vec3(0,0,0), q);
                        sBody.initPosition = new CANNON.Vec3(sx, 0.425, sz);
                        sBody.quaternion.set(0, 0, 0, 1);
                        world.addBody(sBody);

                        // Collision detection
                        sBody.addEventListener("collide", (e) => {
                            if (e.body === ballBody && isBallInPlay && !isBallHit) {
                                handleOut("BOWLED!");
                            }
                        });

                        // Link mesh to body (only for striker end to animate movement)
                        stump.physicsBody = sBody;
                    }
                }
                scene.add(group);
            }

            // Ball
            const bGeo = new THREE.SphereGeometry(0.07, 16, 16);
            const bMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.1, metalness: 0.1 });
            ballMesh = new THREE.Mesh(bGeo, bMat);
            ballMesh.castShadow = true;
            scene.add(ballMesh);

            ballBody = new CANNON.Body({ mass: 0.16, material: physicsMaterial });
            ballBody.addShape(new CANNON.Sphere(0.07));
            ballBody.position.set(0, -10, 0);
            // Ball collision for ground touch
            ballBody.addEventListener('collide', (e) => {
                if (isBallInPlay && isBallHit) {
                    hasTouchedGroundAfterHit = true;
                }
            });

            world.addBody(ballBody);

            // Pitching Marker
            const pMarkGeo = new THREE.RingGeometry(0.15, 0.25, 32);
            const pMarkMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            pitchingMarker = new THREE.Mesh(pMarkGeo, pMarkMat);
            pitchingMarker.rotation.x = -Math.PI / 2;
            pitchingMarker.position.y = 0.05;
            pitchingMarker.visible = false;
            scene.add(pitchingMarker);

            // Direction Guide
            const dGuideGeo = new THREE.BoxGeometry(0.05, 0.01, 3);
            const dGuideMat = new THREE.MeshBasicMaterial({ color: 0x00ffee, transparent: true, opacity: 0.4 });
            directionGuide = new THREE.Mesh(dGuideGeo, dGuideMat);
            directionGuide.position.set(STRIKER_POS.x, 0.05, STRIKER_POS.z);
            scene.add(directionGuide);

            // Wicketkeeper (Further back to see stumps)
            createFielder(0, PITCH_LENGTH / 2 + 4, 'KEEPER');

            // 5 Inner Circle Fielders
            const innerAngles = [0.8, 1.8, 3.14, 4.4, 5.4];
            innerAngles.forEach(a => createFielder(Math.sin(a) * 12, Math.cos(a) * 12, 'FIELDER'));

            // 5 Outer Boundary Fielders
            const outerAngles = [0.4, 1.4, 2.5, 3.8, 5.0];
            outerAngles.forEach(a => createFielder(Math.sin(a) * 50, Math.cos(a) * 50, 'FIELDER'));

            // Bowler with specific reference
            bowlerObj = createFielder(0, -PITCH_LENGTH / 2 - 4.5, 'BOWLER');

            // --- BATSMAN ---
            const side = batsmanHand === 'RIGHT' ? 1 : -1;
            STRIKER_POS.x = -0.5 * side;

            batsmanObj = createFielder(STRIKER_POS.x, STRIKER_POS.z + 0.5, 'BATSMAN');

            // Tilt batsman toward the stumps
            batsmanObj.mesh.rotation.z = 0.2 * side;
            batsmanObj.mesh.rotation.y = Math.PI / 2 * side;

            // Attach bat
            batGroup = new THREE.Group();
            const batBlade = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.8, 0.08), new THREE.MeshStandardMaterial({ color: 0x664422 }));
            batBlade.position.y = -0.6;
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            handle.position.y = 0;
            batGroup.add(batBlade, handle);

            // Position bat "in both hands" and "facing stumps"
            batGroup.position.set(0.15 * side, 0.6, 0.35);
            batGroup.rotation.set(0.3, -0.4 * side, 0.8 * side);

            batsmanObj.mesh.add(batGroup);
            batsmanObj.bat = batGroup;

            // Adjust arms to "grab" the bat handle with BOTH hands
            batsmanObj.lArm.position.set(-0.15, 1.1, 0.05);
            batsmanObj.rArm.position.set(0.15, 1.1, 0.05);

            // Aim arms at the bat handle position
            batsmanObj.lArm.rotation.set(-0.8, -0.2, 0.4 * side);
            batsmanObj.rArm.rotation.set(-0.8, 0.2, -0.4 * side);

            // User Pitching Cursor (only visible when bowling)
            const cursorGeo = new THREE.RingGeometry(0.2, 0.25, 32);
            const cursorMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.6 });
            userPitchingCursor = new THREE.Mesh(cursorGeo, cursorMat);
            userPitchingCursor.rotation.x = -Math.PI / 2;
            userPitchingCursor.position.y = 0.06;
            userPitchingCursor.visible = false;
            scene.add(userPitchingCursor);
        }

        function createFielder(x, z, type) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: type === 'BATSMAN' ? 0xffffff : (type === 'BOWLER' ? 0xffff00 : 0x2244ff) });
            const sMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });

            // Torso
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 0.7, 8), mat);
            body.position.y = 1.05;
            group.add(body);

            // Head (and helmet if batsman)
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.12), sMat);
            head.position.y = 1.5;
            group.add(head);
            if (type === 'BATSMAN') {
                const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0x002244 }));
                helmet.position.y = 1.5; group.add(helmet);
            }

            // Create limbs
            const createLimb = (w, h, py, px) => {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(w, w, h, 6), mat);
                l.position.set(px, py, 0);
                return l;
            };

            const lLeg = createLimb(0.04, 0.7, 0.35, -0.07);
            const rLeg = createLimb(0.04, 0.7, 0.35, 0.07);
            const lArm = createLimb(0.04, 0.6, 1.1, -0.2);
            const rArm = createLimb(0.04, 0.6, 1.1, 0.2);

            group.add(lLeg, rLeg, lArm, rArm);
            group.position.set(x, 0, z);
            scene.add(group);

            const obj = {
                mesh: group, type,
                startX: x, startZ: z,
                lLeg, rLeg, lArm, rArm,
                state: 'idle',
                phase: Math.random() * Math.PI * 2
            };
            fielders.push(obj);
            return obj;
        }

        function setupControls() {
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            });
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();

                // If user is batting
                if (userRole === 'BATTING') {
                    if (batState !== 'idle') return;
                    if (key === 'd') performShot('DRIVE');
                    if (key === 's') performShot('LOFT');
                    if (key === ' ') performShot('DEFEND');
                    if (key === 'l') performShot('LEAVE');
                } else {
                    // If user is bowling
                    if ((key === ' ' || key === 'b') && !isBallInPlay) {
                        bowl();
                    }
                }
            });
        }

        let isBallHit = false;

        function bowl() {
            if (isBallInPlay) return;
            isBallInPlay = true;

            // In user bowling mode, the ball release happens based on user pitching spot
            // In computer bowling mode, it happens after run-up
            
            cameraState = userRole === 'BATTING' ? 'fixed' : 'bowling_side';
            pitchingMarker.visible = false;

            // Bowler Run-up Animation
            const runStartTime = performance.now();
            const runDuration = currentBowlerType === 'FAST' ? 1500 : 1000;
            const startZ = bowlerObj.startZ;
            const endZ = -PITCH_LENGTH / 2;

            const runCycle = setInterval(() => {
                const elapsed = performance.now() - runStartTime;
                const t = Math.min(1, elapsed / runDuration);

                bowlerObj.mesh.position.z = startZ + (endZ - startZ) * t;

                // Run anim
                bowlerObj.phase += 0.3;
                bowlerObj.lLeg.rotation.x = Math.sin(bowlerObj.phase) * 0.5;
                bowlerObj.rLeg.rotation.x = Math.sin(bowlerObj.phase + Math.PI) * 0.5;
                bowlerObj.lArm.rotation.x = Math.sin(bowlerObj.phase + Math.PI) * 0.5;
                bowlerObj.rArm.rotation.x = Math.sin(bowlerObj.phase) * 0.5;

                if (t >= 1) {
                    clearInterval(runCycle);
                    releaseBall();
                }
            }, 16);
        }

        function releaseBall() {
            ballBody.position.set(0, 2.8, -PITCH_LENGTH / 2);
            ballBody.velocity.set(0, 0, 0);

            let vX, vY, vZ, driftX, targetZ;
            const g = -9.82;

            if (userRole === 'BATTING') {
                // COMPUTER BOWLING (ORIGINAL LOGIC)
                const rng = Math.random();
                let deliveryType;
                if (rng < 0.70) deliveryType = 'STUMP_HIT'; 
                else if (rng < 0.95) deliveryType = 'KEEPER_MISS'; 
                else deliveryType = 'WIDE_BOUNCER'; 

                const pitchAhead = (deliveryType === 'WIDE_BOUNCER') ? Math.random() * 3 + 8 : Math.random() * 4 + 4;
                targetZ = STRIKER_POS.z - pitchAhead;
                driftX = (deliveryType === 'STUMP_HIT') ? (Math.random() - 0.5) * 0.3 : (Math.random() - 0.5) * 0.7;

                const speed = currentBowlerType === 'FAST' ? 38 + Math.random() * 5 : 22 + Math.random() * 3;
                vZ = speed;
                const timeToPitch = (targetZ - ballBody.position.z) / vZ;

                let targetHeightAtPitch = 0.07;
                if (deliveryType === 'KEEPER_MISS') targetHeightAtPitch = 0.08;
                if (deliveryType === 'STUMP_HIT') targetHeightAtPitch = 0.04;
                if (deliveryType === 'WIDE_BOUNCER') targetHeightAtPitch = 0.45;

                vY = (targetHeightAtPitch - ballBody.position.y - 0.5 * g * timeToPitch * timeToPitch) / timeToPitch;
                const timeToStumps = (10 - ballBody.position.z) / vZ;
                vX = (driftX - ballBody.position.x) / timeToStumps;
            } else {
                // USER BOWLING
                vZ = currentBowlerType === 'FAST' ? 40 : 25;
                targetZ = pitchingPos.z;
                driftX = pitchingPos.x;
                
                const timeToPitch = (targetZ - ballBody.position.z) / vZ;
                vY = (0.07 - ballBody.position.y - 0.5 * g * timeToPitch * timeToPitch) / timeToPitch;
                const timeToStumps = (STRIKER_POS.z - ballBody.position.z) / vZ;
                vX = (driftX - ballBody.position.x) / timeToStumps;
                
                // If it's spin, add some angular velocity/drift
                if (currentBowlerType === 'SPIN') {
                    ballBody.angularVelocity.set(0, (Math.random() - 0.5) * 15, 0);
                }
            }

            ballBody.velocity.set(vX, vY, vZ);
            showPitchPrediction();
            bowlerObj.rArm.rotation.x = -Math.PI;
            setTimeout(() => { bowlerObj.rArm.rotation.x = 0; }, 500);

            // Handle AI Batting if it's user bowling
            if (userRole === 'BOWLING') {
                planAIBatsmanShot();
            }
        }

        function planAIBatsmanShot() {
            const checkInterval = setInterval(() => {
                if (!isBallInPlay) { clearInterval(checkInterval); return; }
                
                const distZ = ballBody.position.z - STRIKER_POS.z;
                const distX = Math.abs(ballBody.position.x - STRIKER_POS.x);

                // Swing when ball is close, but only if it's reachable
                if (distZ > -2.2 && distZ < 0 && batState === 'idle') {
                    if (distX < 1.2) { 
                        // AI Decision Logic
                        const rng = Math.random();
                        if (rng > 0.05) { // 95% chance to swing
                            let aiShotType = 'DRIVE';
                            // Aggressive logic: Only defend if it's extremely low or extremely accurate
                            if (ballBody.position.y > 1.3) aiShotType = 'LOFT';
                            else if (ballBody.position.y < 0.25) aiShotType = 'DEFEND';
                            
                            // 20% of low balls could still be drives (attacking the yorker)
                            if (aiShotType === 'DEFEND' && Math.random() > 0.8) aiShotType = 'DRIVE';
                            
                            // Randomize AI quality
                            const qualityRng = Math.random();
                            let aiDirection = (ballBody.position.x - STRIKER_POS.x) * 0.8;
                            
                            if (qualityRng < 0.2) { // 20% chance of thick edge/mis-hit
                                aiDirection += (Math.random() - 0.5) * 2.0; 
                                showFeedback("MISTIMED!");
                            } else if (qualityRng < 0.35) { // 15% chance of missing completely
                                // Do nothing, let it go through
                                showFeedback("BEATEN!");
                            } else {
                                performShot(aiShotType, aiDirection + (Math.random() - 0.5) * 0.3);
                            }
                        } else {
                            showFeedback("LEFT!");
                        }
                    } else if (distX < 2.0) {
                        // Wide but close enough to maybe edge?
                        if (Math.random() < 0.3) {
                            performShot('DRIVE', (ballBody.position.x - STRIKER_POS.x));
                            showFeedback("EDGE!");
                        } else {
                            showFeedback("WIDE!");
                        }
                    } else {
                        showFeedback("WIDE!");
                    }
                    clearInterval(checkInterval);
                }
            }, 20);
        }

        function performShot(type, customDirection) {
            if (type === 'LEAVE') { showFeedback("LEFT!"); return; }
            batState = 'swinging';
            
            // If customDirection is provided, use it (AI), else use mouseX (User)
            const targetDirection = (customDirection !== undefined) ? customDirection : mouseX;
            const swingTarget = targetDirection * (Math.PI / 1.5);
            const startTime = performance.now();

            const interval = setInterval(() => {
                const elapsed = performance.now() - startTime;
                const t = Math.min(1, elapsed / 250);

                const side = batsmanHand === 'RIGHT' ? 1 : -1;
                batsmanObj.mesh.rotation.y = (Math.PI / 2 * side) + swingTarget * 0.5;

                const swingPhase = Math.sin(t * Math.PI);
                batsmanObj.lArm.rotation.x = -0.8 - (Math.PI / 1.5 * swingPhase);
                batsmanObj.rArm.rotation.x = -0.8 - (Math.PI / 1.5 * swingPhase);

                if (batsmanObj.bat) {
                    batsmanObj.bat.rotation.x = - (Math.PI / 1.2 * swingPhase);
                }

                const dist = ballMesh.position.distanceTo(new THREE.Vector3(STRIKER_POS.x, 1.0, STRIKER_POS.z));
                if (dist < 1.4 && batState === 'swinging') {
                    hitBall(type, targetDirection);
                    batState = 'hit';
                    if (userRole === 'BATTING') cameraState = 'follow';
                }

                if (t >= 1) {
                    clearInterval(interval);
                    batState = 'idle';
                    batsmanObj.lArm.rotation.x = -0.8;
                    batsmanObj.rArm.rotation.x = -0.8;
                    if (batsmanObj.bat) batsmanObj.bat.rotation.x = 0;
                }
            }, 16);
        }

        function hitBall(type, direction) {
            isBallHit = true;
            hasTouchedGroundAfterHit = false;
            const zDist = Math.abs(ballMesh.position.z - STRIKER_POS.z);
            let power = Math.max(0.1, 1.2 - zDist);
            
            // Adjust power based on timing
            let feedback = power > 0.9 ? "SUPERB!" : (power > 0.5 ? "GOOD" : "EDGE...");
            if (type === 'DEFEND') { power *= 0.1; feedback = "DEFENDED"; }
            if (type === 'LOFT') { power *= 1.6; feedback = "LOFTED!"; }
            
            const baseSpeed = type === 'LOFT' ? 45 : (type === 'DRIVE' ? 35 : 8);
            const hitAngle = direction * (Math.PI / 2);
            const kX = -Math.sin(hitAngle), kZ = -Math.abs(Math.cos(hitAngle));

            const kY = type === 'LOFT' ? 0.75 : 0.05;
            
            // If AI hit, make it slightly randomized
            const variance = userRole === 'BOWLING' ? 0.9 + Math.random() * 0.2 : 1.0;
            ballBody.velocity.set(kX * baseSpeed * power * variance, kY * baseSpeed * power * variance, kZ * baseSpeed * power * variance);
            showFeedback(feedback);
        }

        function handleOut(txt) {
            if (!isBallInPlay) return;
            showFeedback(txt);
            wickets++;
            updateHUD();
            isBallInPlay = false;
            isBallHit = false;

            if (wickets >= 10) {
                endGame();
            } else {
                setTimeout(resetBall, 2000);
            }
        }

        function showFeedback(txt) {
            const el = document.getElementById('shot-feedback');
            el.textContent = txt; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1500);
        }

        function updateFielding() {
            const ballX = ballBody.position.x, ballZ = ballBody.position.z;
            const ballSpeed = ballBody.velocity.length();

            // Find the closest fielder to the ball
            let closestFielder = null;
            let minDist = Infinity;

            fielders.forEach(f => {
                if (f.type === 'KEEPER' || f.type === 'BOWLER' || f.type === 'BATSMAN') return;
                const distToBall = f.mesh.position.distanceTo(ballMesh.position);
                if (distToBall < minDist) {
                    minDist = distToBall;
                    closestFielder = f;
                }
            });

            fielders.forEach(f => {
                if (f.type === 'KEEPER' || f.type === 'BOWLER' || f.type === 'BATSMAN') return;
                const distToBall = f.mesh.position.distanceTo(ballMesh.position);

                // Fielders chase if it's hit, even if slow (defense)
                // Closest fielder is always more aggressive
                const isClosest = f === closestFielder;
                const chaseThreshold = isClosest ? 80 : 40; 
                const speedThreshold = isClosest ? 0.05 : 0.5;

                const shouldChase = isBallHit && distToBall < chaseThreshold && ballSpeed > speedThreshold;

                if (shouldChase) {
                    // CATCHING Logic: If ball is in air and close to fielder
                    if (!hasTouchedGroundAfterHit && ballMesh.position.y > 0.5 && ballMesh.position.y < 2.5 && distToBall < 1.5) {
                        handleOut("CAUGHT!");
                        isBallHit = false;
                        return;
                    }

                    const dir = ballMesh.position.clone().sub(f.mesh.position).normalize();
                    f.mesh.position.x += dir.x * 0.18;
                    f.mesh.position.z += dir.z * 0.18;
                    f.mesh.lookAt(ballMesh.position.x, 0, ballMesh.position.z);

                    f.phase += 0.3;
                    f.lLeg.rotation.x = Math.sin(f.phase) * 0.6;
                    f.rLeg.rotation.x = Math.sin(f.phase + Math.PI) * 0.6;
                    f.lArm.rotation.x = Math.sin(f.phase + Math.PI) * 0.4;
                    f.rArm.rotation.x = Math.sin(f.phase) * 0.4;

                    if (distToBall < 2.0) { f.lArm.rotation.x = -1.2; f.rArm.rotation.x = -1.2; }

                    if (distToBall < 1.1) {
                        ballBody.velocity.set(0, 0, 0); showFeedback("STOPPED!");
                        isBallHit = false;
                        setTimeout(resetBall, 1500);
                    }
                } else if (!isBallInPlay) {
                    const distToHome = Math.sqrt((f.mesh.position.x - f.startX) ** 2 + (f.mesh.position.z - f.startZ) ** 2);
                    if (distToHome > 0.5) {
                        const dir = new THREE.Vector3(f.startX, 0, f.startZ).sub(f.mesh.position).normalize();
                        f.mesh.position.x += dir.x * 0.12; f.mesh.position.z += dir.z * 0.12;
                        f.mesh.lookAt(f.startX, 0, f.startZ);
                        f.phase += 0.2;
                        f.lLeg.rotation.x = Math.sin(f.phase) * 0.4; f.rLeg.rotation.x = Math.sin(f.phase + Math.PI) * 0.4;
                    } else {
                        f.lLeg.rotation.x = 0; f.rLeg.rotation.x = 0;
                        f.lArm.rotation.x = 0; f.rArm.rotation.x = 0;
                        f.mesh.lookAt(0, 0, 0);
                    }
                }
            });

            const dist = Math.sqrt(ballX * ballX + ballZ * ballZ);
            if (dist > BOUNDARY_RADIUS && isBallInPlay) {
                const runs = (!hasTouchedGroundAfterHit) ? 6 : 4;
                score += runs; showFeedback(runs + " RUNS!");
                isBallHit = false;
                resetBall();
            }
            // Ball passed the striker
            if (ballZ > STRIKER_POS.z + 1 && isBallInPlay && !isBallHit) {
                // Wide check: Too high or too wide horizontally
                const isTooHigh = ballBody.position.y > 2.5;
                const isTooWide = Math.abs(ballBody.position.x) > PITCH_WIDTH / 2 + 0.1;

                if (isTooHigh || isTooWide) {
                    handleWide();
                } else {
                    // Keeper logic: collect ball
                    const distToKeeper = ballMesh.position.distanceTo(fielders.find(f => f.type === 'KEEPER').mesh.position);
                    if (distToKeeper < 3.0) {
                        ballBody.velocity.set(0, 0, 0);
                        showFeedback("COLLECTED!");
                        isBallHit = false;
                        setTimeout(resetBall, 1500);
                    } else {
                        isBallHit = false;
                        resetBall();
                    }
                }
            }
        }

        function handleWide() {
            if (!isBallInPlay) return;
            showFeedback("WIDE!");
            score++;
            ballsBowled--;
            updateHUD();
            isBallInPlay = false;
            setTimeout(resetBall, 1500);
        }

        function resetBall() {
            if (!isBallInPlay && ballsBowled === 0) return; 
            
            ballsBowled++;
            if (ballsBowled >= 12 || (currentInnings === 2 && score >= target)) {
                endGame();
                return;
            }

            isBallInPlay = false; 
            ballBody.position.set(0, -10, 0); 
            ballBody.velocity.set(0, 0, 0); 
            isBallHit = false;
            updateHUD();
            
            // Reset stump physical positions and stop them
            scene.traverse(child => {
                if (child.physicsBody) {
                    const b = child.physicsBody;
                    b.position.set(b.initPosition.x, b.initPosition.y, b.initPosition.z);
                    b.quaternion.set(0, 0, 0, 1);
                    b.velocity.set(0,0,0);
                    b.angularVelocity.set(0,0,0);
                    b.sleepState = CANNON.Body.SLEEPY; // Put to sleep until hit
                }
            });

            if (ballsBowled % 6 === 0) {
                currentBowlerType = currentBowlerType === 'FAST' ? 'SPIN' : 'FAST';
            }

            if (userRole === 'BATTING') {
                setTimeout(bowl, 2500);
            }
        }

        function updateHUD() {
            document.getElementById('score').textContent = score + " / " + wickets;
            document.getElementById('overs').textContent = Math.floor(ballsBowled / 6) + "." + (ballsBowled % 6);
            document.getElementById('batting-team').textContent = currentBattingTeam;
            document.getElementById('match-status').textContent = currentInnings === 1 ? "1ST INNINGS" : "2ND INNINGS";
            
            if (currentInnings === 2) {
                document.getElementById('target-ui').style.display = 'block';
                document.getElementById('target-val').textContent = target;
            } else {
                document.getElementById('target-ui').style.display = 'none';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1 / 60);
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            scene.traverse(child => {
                if (child.physicsBody) {
                    child.position.copy(child.physicsBody.position);
                    child.quaternion.copy(child.physicsBody.quaternion);
                }
            });

            updateFielding();

            // Camera System
            if (cameraState === 'follow' && isBallInPlay) {
                const targetPos = new THREE.Vector3(ballMesh.position.x, ballMesh.position.y + 4, ballMesh.position.z + 10);
                camera.position.lerp(targetPos, 0.05);
                camera.lookAt(ballMesh.position);
            } else if (isBallHit && isBallInPlay) {
                // Follow the ball after a hit even in bowling mode
                const targetPos = new THREE.Vector3(ballMesh.position.x, ballMesh.position.y + 10, ballMesh.position.z + 20);
                camera.position.lerp(targetPos, 0.03);
                camera.lookAt(ballMesh.position);
            } else if (cameraState === 'bowling_side') {
                const defaultPos = new THREE.Vector3(0, 4, -PITCH_LENGTH / 2 - 10);
                camera.position.lerp(defaultPos, 0.05);
                camera.lookAt(0, 1, 10);
            } else {
                const defaultPos = new THREE.Vector3(0, 3, PITCH_LENGTH / 2 + 8);
                camera.position.lerp(defaultPos, 0.05);
                camera.lookAt(0, 1, 0);
            }

            // User Pitching Cursor Control
            if (userRole === 'BOWLING' && !isBallInPlay && userPitchingCursor) {
                userPitchingCursor.visible = true;
                // Map mouseX/Y to pitch area
                const px = mouseX * 1.5;
                const pz = -PITCH_LENGTH / 2 + (3.5 - mouseY) * 3 + 4; // Top of screen = further away
                userPitchingCursor.position.x = px;
                userPitchingCursor.position.z = pz;
                pitchingPos.set(px, 0, pz);
            } else if (userPitchingCursor) {
                userPitchingCursor.visible = false;
            }

            // Update Direction Guide
            if (directionGuide && batsmanObj) {
                const hitAngle = mouseX * (Math.PI / 2);
                directionGuide.rotation.y = hitAngle;
                const offset = 1.5;
                directionGuide.position.set(
                    STRIKER_POS.x - Math.sin(hitAngle) * offset,
                    0.05,
                    STRIKER_POS.z - Math.cos(hitAngle) * offset
                );
                directionGuide.visible = !isBallHit && isBallInPlay && userRole === 'BATTING';
            }

            if (ballBody.position.z > pitchingMarker.position.z + 0.5) {
                pitchingMarker.visible = false;
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('toss-overlay').style.display = 'flex';
        }

        function handleToss(choice) {
            const tossValue = Math.random() < 0.5 ? 'HEADS' : 'TAILS';
            userWonToss = tossValue === choice;

            document.getElementById('toss-overlay').style.display = 'none';
            document.getElementById('decision-overlay').style.display = 'flex';

            const title = document.getElementById('toss-result-title');
            const text = document.getElementById('toss-result-text');
            const buttons = document.getElementById('decision-buttons');
            const contBtn = document.getElementById('decision-continue-btn');

            if (userWonToss) {
                title.textContent = "YOU WON THE TOSS!";
                text.textContent = "WHAT WOULD YOU LIKE TO DO?";
                buttons.style.display = 'flex';
                contBtn.style.display = 'none';
            } else {
                title.textContent = "COMPUTER WON THE TOSS!";
                const decision = Math.random() < 0.5 ? 'BATTING' : 'BOWLING';
                userRole = decision === 'BATTING' ? 'BOWLING' : 'BATTING';
                text.textContent = "Computer decided to " + decision + " first.";
                buttons.style.display = 'none';
                contBtn.style.display = 'block';
            }
        }

        function makeDecision(role) {
            userRole = role;
            startInnings();
        }

        function startInnings() {
            document.getElementById('decision-overlay').style.display = 'none';
            document.getElementById('innings-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            init();

            currentBattingTeam = (currentInnings === 1) ? 
                (userRole === 'BATTING' ? 'USER' : 'COMPUTER') : 
                (userRole === 'BATTING' ? 'COMPUTER' : 'USER');

            // Reset scores for new innings
            score = 0;
            ballsBowled = 0;
            wickets = 0;
            isBallInPlay = false;
            isBallHit = false;

            updateHUD();
            
            if (userRole === 'BATTING') {
                document.getElementById('batting-controls').style.display = 'flex';
                document.getElementById('bowling-controls').style.display = 'none';
                cameraState = 'fixed';
            } else {
                document.getElementById('batting-controls').style.display = 'none';
                document.getElementById('bowling-controls').style.display = 'flex';
                cameraState = 'bowling_side';
            }

            if (userRole === 'BATTING') {
                setTimeout(bowl, 2000);
            }
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('game-ui').style.display = 'none';
            
            if (currentInnings === 1) {
                target = score + 1;
                currentInnings = 2;
                userRole = (userRole === 'BATTING' ? 'BOWLING' : 'BATTING');
                
                document.getElementById('innings-overlay').style.display = 'flex';
                document.getElementById('innings-status-text').textContent = 
                    (currentBattingTeam === 'USER' ? "USER" : "COMPUTER") + 
                    " scored " + score + ". Target is " + target;
            } else {
                const winner = (currentBattingTeam === 'USER') ? 
                    (score >= target ? "USER WON!" : "COMPUTER WON!") :
                    (score >= target ? "COMPUTER WON!" : "USER WON!");
                
                document.getElementById('game-over-overlay').style.display = 'flex';
                document.getElementById('game-over-status').textContent = winner;
            }
        }

        function restartGame() {
            document.getElementById('game-over-overlay').style.display = 'none';
            document.getElementById('start-overlay').style.display = 'flex';
            currentInnings = 1;
            score = 0;
            ballsBowled = 0;
            wickets = 0;
            isGameOver = false;
            target = 0;
            updateHUD();
        }

        function toggleHandedness() {
            batsmanHand = (batsmanHand === 'RIGHT') ? 'LEFT' : 'RIGHT';
            createPlayers();
            // Reset ball position immediately after recreation
            ballBody.position.set(0, -10, 0);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
